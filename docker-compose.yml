services:
  db:
    image: mysql:8.4
    container_name: busgo-db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: busgo
      MYSQL_USER: busgo
      MYSQL_PASSWORD: busgo123
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - busgo-mysql-data:/var/lib/mysql

volumes:
  busgo-mysql-data:
