<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BusGo | Register</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="register">
    <header class="topbar">
      <div class="topbar-left">
        <button type="button" class="back-btn" onclick="window.history.back()" aria-label="Go back">←</button>
        <a class="brand" href="index.html">BusGo</a>
        <nav class="crumbs">Register</nav>
      </div>
      <div id="authNav" class="auth-nav"></div>
    </header>

    <main class="page">
      <section class="panel auth-panel reveal">
        <h1>Create account</h1>
        <p class="subtle">This is a mock auth system using localStorage.</p>

        <form id="registerForm" class="auth-form">
          <label>
            <span>Full Name</span>
            <input id="registerName" type="text" autocomplete="name" required />
          </label>
          <label>
            <span>Email</span>
            <input id="registerEmail" type="email" autocomplete="email" required />
          </label>
          <label>
            <span>Password</span>
            <input id="registerPassword" type="password" autocomplete="new-password" required />
          </label>
          <label>
            <span>Role</span>
            <select id="registerRole">
              <option value="user">User</option>
              <option value="admin">Admin</option>
            </select>
          </label>
          <button type="submit" class="btn btn-primary">Register</button>
        </form>

        <p class="subtle small" style="margin: 14px 0 0;">
          Already have an account?
          <a href="customer-login.html">Customer Login</a>
        </p>
      </section>
    </main>

    <div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="true"></div>
    <script src="script.js"></script>
  </body>
  </html>
