spring:
  datasource:
    url: ${BUSGO_DB_URL:jdbc:mysql://localhost:3306/busgo?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Istanbul}
    username: ${BUSGO_DB_USER:busgo}
    password: ${BUSGO_DB_PASS:busgo123}
  mail:
    properties:
      "[mail.smtp.connectiontimeout]": 5000
      "[mail.smtp.timeout]": 5000
      "[mail.smtp.writetimeout]": 5000
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        type:
          preferred_uuid_jdbc_type: BINARY

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: warn

busgo:
  demo-balance:
    initial: ${BUSGO_DEMO_BALANCE_INITIAL:5000}
  iyzico:
    base-url: ${IYZI_BASE_URL:https://sandbox-api.iyzipay.com}
    api-key: ${IYZI_API_KEY:}
    secret-key: ${IYZI_SECRET_KEY:}
  mail:
    from: ${BUSGO_MAIL_FROM:}
    booking-subject-prefix: ${BUSGO_MAIL_SUBJECT_PREFIX:[BusGo]}
