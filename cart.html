<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BusGo | Cart</title>
    <link rel="stylesheet" href="styles.css?v=20260416_13" />
  </head>
  <body data-page="cart">
    <header class="topbar">
      <div class="topbar-left">
        <button type="button" class="back-btn" onclick="window.history.back()" aria-label="Go back">←</button>
        <a class="brand" href="index.html">BusGo</a>
        <nav class="crumbs">Seat Selection / Cart</nav>
      </div>
      <div id="authNav" class="auth-nav"></div>
    </header>

    <main class="page">
      <section class="panel reveal">
        <h1>Booking Cart</h1>
        <div id="cartMeta" class="ticket-meta"></div>
        <div id="cartPassengers" class="ticket-passengers"></div>
        <div id="cartTotal" class="ticket-total"></div>
        <button id="proceedPaymentBtn" class="btn btn-primary">Proceed to Payment</button>
      </section>
    </main>

    <div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="true"></div>
    <script src="script.js?v=20260416_13"></script>
  </body>
</html>
