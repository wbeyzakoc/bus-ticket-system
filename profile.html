<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BusGo | Profile</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="profile">
    <header class="topbar">
      <div class="topbar-left">
        <button type="button" class="back-btn" onclick="window.history.back()" aria-label="Go back">←</button>
        <a class="brand" href="index.html">BusGo</a>
        <nav class="crumbs">Profile</nav>
      </div>
      <div id="authNav" class="auth-nav"></div>
    </header>

    <main class="page">
      <section class="panel reveal">
        <h1>My Profile</h1>
        <div id="profileInfo" class="profile-info"></div>
        <button id="profileLogoutBtn" class="btn btn-primary">Logout</button>
      </section>

      <section id="ticketsSection" class="panel reveal">
        <h2>My Tickets</h2>
        <div id="myTickets" class="ticket-list"></div>
      </section>

      <section id="adminSection" class="panel reveal" style="display: none;">
        <h2>Add Admin</h2>
        <form id="addAdminForm" class="auth-form">
          <label>
            <span>Full Name</span>
            <input id="adminName" type="text" autocomplete="name" required />
          </label>
          <label>
            <span>Email</span>
            <input id="adminEmail" type="email" autocomplete="email" required />
          </label>
          <label>
            <span>Password</span>
            <input id="adminPassword" type="password" autocomplete="new-password" required />
          </label>
          <label>
            <span>Company Name</span>
            <input id="adminCompanyName" type="text" required />
          </label>
          <label>
            <span>Company ID</span>
            <input id="adminCompanyId" type="text" required />
          </label>
          <button type="submit" class="btn btn-primary">Add Admin</button>
        </form>
      </section>
    </main>

    <div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="true"></div>
    <script src="script.js"></script>
  </body>
</html>
