<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BusGo | Profile</title>
    <link rel="stylesheet" href="styles.css?v=20260416_17" />
  </head>
  <body data-page="profile">
    <header class="topbar">
      <div class="topbar-left">
        <button type="button" class="back-btn" onclick="window.history.back()" aria-label="Go back">←</button>
        <a class="brand" href="index.html">BusGo</a>
        <nav class="crumbs">Profile</nav>
      </div>
      <div id="authNav" class="auth-nav"></div>
    </header>

    <main class="page">
      <section class="panel reveal">
        <h1>My Profile</h1>
        <div id="profileInfo" class="profile-info"></div>
        <button id="profileLogoutBtn" class="btn btn-primary">Logout</button>
      </section>

      <section id="profileTicketsSection" class="panel reveal">
        <h2>My Tickets</h2>
        <div id="myTickets" class="ticket-list"></div>
      </section>

      <section id="profileAdminSection" class="panel reveal" hidden>
        <h2>Add Admin</h2>
        <p class="subtle">Create a dedicated admin account with its own password.</p>
        <form id="profileAdminCreateForm" class="admin-form">
          <label><span>Name</span><input id="profileAdminFirstName" type="text" autocomplete="given-name" required /></label>
          <label><span>Surname</span><input id="profileAdminLastName" type="text" autocomplete="family-name" required /></label>
          <label><span>Company Name</span><input id="profileAdminCompanyName" type="text" required /></label>
          <label><span>Email</span><input id="profileAdminEmail" type="email" autocomplete="email" required /></label>
          <label><span>Password</span><input id="profileAdminPassword" type="password" autocomplete="new-password" required /></label>
          <button type="submit" class="btn btn-primary">Add Admin</button>
        </form>
        <div id="profileAdminCreateResult" class="admin-list"></div>
      </section>
    </main>

    <div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="true"></div>
    <script src="script.js?v=20260416_19"></script>
  </body>
</html>
