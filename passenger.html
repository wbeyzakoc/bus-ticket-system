<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BusGo | Passenger Information</title>
    <link rel="stylesheet" href="styles.css?v=20260416_13" />
  </head>
  <body data-page="passenger">
    <header class="topbar">
      <div class="topbar-left">
        <button type="button" class="back-btn" onclick="window.history.back()" aria-label="Go back">←</button>
        <a class="brand" href="index.html">BusGo</a>
        <nav class="crumbs">Search / Trips / Passenger Info</nav>
      </div>
      <div id="authNav" class="auth-nav"></div>
    </header>

    <main class="page">
      <section class="panel reveal">
        <h1>Passenger Information</h1>
        <p id="passengerTripMeta" class="subtle"></p>
        <form id="passengerForm">
          <div id="passengerCards" class="passenger-cards"></div>
          <div class="passenger-form-actions">
            <button type="button" id="addPassengerBtn" class="btn ghost">Add Passenger</button>
            <button type="submit" id="continueToSeatsBtn" class="btn btn-primary">Continue to Seat Selection</button>
          </div>
        </form>
      </section>
    </main>

    <div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="true"></div>
    <script src="script.js?v=20260416_13"></script>
  </body>
</html>
